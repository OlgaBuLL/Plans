<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily plans</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/checked-tick.png" />
  </head>
  <body>
    <h1 class="title">
      What are your<span class="plans"> plans </span>for today<span
        mytitle="Click to get a hint"
        class="question"
        >?</span
      >
    </h1>
    <div class="modal-window">
      <div class="close">
        <button>
          <img src="./images/close.svg" alt="Close" title="Close" />
        </button>
      </div>
      <div>
        <p>One click - FINISH TASK</p>
        <img src="./images/finished.svg" alt="Finish" />
      </div>
      <div>
        <p>Double click - DELETE TASK</p>
        <img src="./images/deleted.svg" alt="Delete" />
      </div>
    </div>

    <div class="enter-data">
      <input
        class="input"
        type="text"
        placeholder="e.g.   take a violin lesson..."
      />
      <button class="button">Add</button>
    </div>

    <ul class="container"></ul>

    <script src="./script.js"></script>
  </body>
</html>
